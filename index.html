const { useState, useEffect, useRef, useCallback } = React;

function KatexSpan({ tex, display = false, style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.katex) {
      katex.render(tex, ref.current, { displayMode: display, throwOnError: false, strict: false });
    }
  }, [tex, display]);
  return <span ref={ref} style={{ display: display ? 'block' : 'inline', ...style }} />;
}

/* ═══════════════════════════════════════════════
   ANIMATED NETWORK CANVAS
═══════════════════════════════════════════════ */
function NetworkCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    const N = 42;
    const nodes = Array.from({ length: N }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r: 1.5 + Math.random() * 2,
    }));

    const tick = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > canvas.width)  n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
      });
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < 140) {
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(147,197,253,${(1 - d / 140) * 0.55})`;
            ctx.lineWidth = .7;
            ctx.stroke();
          }
        }
      }
      nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(147,197,253,0.75)';
        ctx.fill();
      });
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} id="hero-canvas" style={{ opacity: .2 }} />;
}

/* ═══════════════════════════════════════════════
   WHAT IS RECOURSE
═══════════════════════════════════════════════ */
function RecourseSlider() {
  const [income, setIncome] = useState(38);
  const [education, setEducation] = useState(12);
  const [employment, setEmployment] = useState(18);

  const score = income * 0.45 + education * 2.5 + employment * 0.25;
  const threshold = 70;
  const approved = score >= threshold;
  const pct = Math.min(100, Math.round((score / threshold) * 100));

  const recourseIncome = Math.ceil((threshold - education * 2.5 - employment * 0.25) / 0.45);
  const recourseEdu   = Math.ceil((threshold - income * 0.45 - employment * 0.25) / 2.5);

  return (
    <div style={{ background: '#f8faff', border: '1px solid #dbeafe', borderRadius: 14, padding: '1.75rem' }}>
      <div style={{ fontSize: '.72rem', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '.1em', marginBottom: '1.25rem' }}>
        Interactive Example · Loan Decision
      </div>

      {[
        { label: 'Annual Income ($k)', val: income, set: setIncome, min: 10, max: 120 },
        { label: 'Education (years)',   val: education, set: setEducation, min: 6, max: 22 },
        { label: 'Employment (months)', val: employment, set: setEmployment, min: 0, max: 120 },
      ].map(({ label, val, set, min, max }) => (
        <div key={label} style={{ marginBottom: '1.1rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
            <span style={{ fontSize: '.82rem', color: '#374151', fontWeight: 500 }}>{label}</span>
            <span style={{ fontSize: '.82rem', color: '#2563eb', fontWeight: 700, fontFamily: '"JetBrains Mono", monospace' }}>{val}</span>
          </div>
          <input type="range" min={min} max={max} value={val} onChange={e => set(+e.target.value)} />
        </div>
      ))}

      {/* Score bar */}
      <div style={{ margin: '1.25rem 0 .5rem' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
          <span style={{ fontSize: '.75rem', color: '#6b7280', fontWeight: 600 }}>Credit Score</span>
          <span style={{ fontSize: '.75rem', color: approved ? '#059669' : '#dc2626', fontWeight: 700 }}>{Math.round(score)}/100</span>
        </div>
        <div style={{ height: 6, background: '#e5e7eb', borderRadius: 3, overflow: 'hidden' }}>
          <div style={{ height: '100%', borderRadius: 3, width: `${pct}%`, background: approved ? 'linear-gradient(90deg,#10b981,#34d399)' : 'linear-gradient(90deg,#ef4444,#f87171)', transition: 'width .4s ease, background .4s ease' }} />
        </div>
      </div>

      {/* Decision */}
      <div style={{
        padding: '1rem 1.2rem', borderRadius: 9,
        background: approved ? 'rgba(16,185,129,.08)' : 'rgba(239,68,68,.08)',
        border: `1px solid ${approved ? 'rgba(16,185,129,.3)' : 'rgba(239,68,68,.3)'}`,
        transition: 'all .3s',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: approved ? 0 : 8 }}>
          <div style={{ width: 9, height: 9, borderRadius: '50%', background: approved ? '#10b981' : '#ef4444', flexShrink: 0, transition: 'background .3s' }} />
          <span style={{ fontWeight: 700, fontSize: '.88rem', color: approved ? '#065f46' : '#7f1d1d' }}>
            {approved ? 'Loan Approved ✓' : 'Loan Denied ✗'}
          </span>
        </div>
        {!approved && (
          <p style={{ fontSize: '.75rem', color: '#6b7280', lineHeight: 1.6 }}>
            <strong style={{ color: '#374151' }}>Recourse:</strong> Increase income to ${recourseIncome}k  <em>or</em> education to {recourseEdu} years to reverse this decision.
          </p>
        )}
      </div>
    </div>
  );
}

              Find the minimal-cost perturbation <KatexSpan tex="\delta" /> to input <KatexSpan tex="\mathbf{x}" /> such that model <KatexSpan tex="f" /> predicts the desired outcome <KatexSpan tex="y^*" />.
            </p>
          </div>

          <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 11 }}>

              </li>

/* ═══════════════════════════════════════════════
   BENCHMARK
═══════════════════════════════════════════════ */
function Benchmark() {
  const [animated, setAnimated] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setAnimated(true); }, { threshold: .3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  const metrics = [
    { name: 'Validity',     pct: 92, color: '#60a5fa', formula: 'f(\\mathbf{x}+\\delta) = y^*',                               desc: 'Recourse achieves target outcome under the original model.' },
    { name: 'Cost',         pct: 81, color: '#a78bfa', formula: 'c(\\delta) = \\|\\delta\\|_1',                                desc: 'L₁ distance in feature space, normalized by actionability constraints.' },
    { name: 'Plausibility', pct: 68, color: '#34d399', formula: '\\delta \\in \\mathcal{F}(\\mathbf{x})',                       desc: 'Recourse lies within the data manifold and satisfies domain constraints.' },
    { name: 'Robustness',   pct: 54, color: '#fbbf24', formula: '\\mathbb{P}(f(\\mathbf{x}+\\delta+\\epsilon)=y^*) \\geq \\alpha', desc: 'Recommendation remains valid under small input and model perturbations.' },
  ];

  return (
    <section id="benchmark" ref={ref} style={{ background: '#080f27', padding: '5.5rem 2rem' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ textAlign: 'center', marginBottom: '3.5rem' }}>
          <div style={{ fontSize: '.72rem', fontWeight: 700, color: '#60a5fa', textTransform: 'uppercase', letterSpacing: '.1em', marginBottom: '.75rem' }}>RecourseBench</div>
          <h2 style={{ fontSize: 'clamp(1.8rem,3.5vw,2.4rem)', fontWeight: 800, letterSpacing: '-.03em', color: '#fff', marginBottom: '.75rem' }}>
            Benchmarking Recourse
          </h2>
          <p style={{ fontSize: '1rem', color: 'rgba(255,255,255,.5)', maxWidth: 500, margin: '0 auto', lineHeight: 1.72 }}>
            Evaluate methods across standardized metrics on curated datasets. Reproducible. Open. Community-driven.
          </p>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(240px,1fr))', gap: '1.25rem', marginBottom: '3rem' }}>
          {metrics.map(m => (
            <div key={m.name} style={{
              background: 'rgba(255,255,255,.055)', border: '1px solid rgba(255,255,255,.09)',
              borderRadius: 11, padding: '1.75rem',
              transition: 'background .2s',
            }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,.09)'}
              onMouseLeave={e => e.currentTarget.style.background = 'rgba(255,255,255,.055)'}
            >
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '.75rem' }}>
                <h4 style={{ color: '#fff', fontWeight: 700, fontSize: '.98rem' }}>{m.name}</h4>
                <span style={{ color: m.color, fontWeight: 800, fontSize: '1.15rem', fontFamily: '"JetBrains Mono", monospace' }}>{m.pct}%</span>
              </div>
              <div style={{ height: 5, background: 'rgba(255,255,255,.1)', borderRadius: 3, marginBottom: '1rem', overflow: 'hidden' }}>
                <div style={{
                  height: '100%', borderRadius: 3, background: m.color,
                  width: animated ? `${m.pct}%` : '0%',
                  transition: 'width 1.1s cubic-bezier(.34,1.56,.64,1)',
                }} />
              </div>
              <div style={{ background: 'rgba(255,255,255,.04)', borderRadius: 7, padding: '.55rem .75rem', marginBottom: '.75rem' }}>
                <KatexSpan tex={m.formula} style={{ color: m.color, fontSize: '.8rem' }} />
              </div>
              <p style={{ fontSize: '.75rem', color: 'rgba(255,255,255,.4)', lineHeight: 1.58 }}>{m.desc}</p>
            </div>
          ))}
        </div>

        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button style={{ padding: '12px 28px', background: '#2563eb', color: '#fff', borderRadius: 8, fontWeight: 700, fontSize: '.9rem', border: 'none', cursor: 'pointer', boxShadow: '0 4px 20px rgba(37,99,235,.4)', transition: 'background .2s', fontFamily: 'inherit' }}
            onMouseEnter={e => e.currentTarget.style.background='#1d4ed8'}
            onMouseLeave={e => e.currentTarget.style.background='#2563eb'}>
            View Leaderboard
          </button>
          <button style={{ padding: '12px 28px', background: 'transparent', color: '#fff', border: '1.5px solid rgba(255,255,255,.2)', borderRadius: 8, fontWeight: 600, fontSize: '.9rem', cursor: 'pointer', transition: 'background .2s', fontFamily: 'inherit' }}

                  <marker id="arrowHead" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
                    <path d="M0,0 L0,7 L7,3.5 z" fill="#60a5fa"/>
                  </marker>
                </defs>
                <text x="28" y="118" fill="#ef4444" fontSize="8" opacity=".6" fontFamily="Inter,sans-serif">Denied</text>
                <text x="198" y="18" fill="#10b981" fontSize="8" opacity=".6" fontFamily="Inter,sans-serif">Approved</text>
                <text x="95" y="118" fill="#f59e0b" fontSize="8" opacity=".6" fontFamily="Inter,sans-serif">Individual</text>
              </svg>
            </div>

            {/* Status */}
            <div style={{ borderRadius: 8, padding: '.8rem 1rem', background: loading ? 'rgba(245,158,11,.08)' : generated ? 'rgba(37,99,235,.12)' : 'rgba(255,255,255,.04)', border: `1px solid ${loading ? 'rgba(245,158,11,.2)' : generated ? 'rgba(37,99,235,.25)' : 'rgba(255,255,255,.08)'}`, transition: 'all .3s' }}>
              {loading ? (
                <span style={{ fontSize: '.75rem', color: '#f59e0b', fontFamily: '"JetBrains Mono", monospace' }}>⟳ Computing recourse...</span>
              ) : generated ? (
                <span style={{ fontSize: '.75rem', color: '#93c5fd', fontFamily: '"JetBrains Mono", monospace' }}>✓ {msg}</span>
              ) : (
                <span style={{ fontSize: '.75rem', color: '#6e7681', fontFamily: '"JetBrains Mono", monospace' }}>Select parameters and launch demo.</span>
              )}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}
