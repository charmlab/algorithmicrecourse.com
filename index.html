  { term:"Validity", def:"Fraction of generated recourse actions that successfully flip the model's prediction to the desired outcome.", aka:"Success Rate" },

];

═══════════════════════════════════════ */
function TrackTabs({ active, setActive }) {
  const tabs = [
    { key:'research',    label:'Explore Research',   icon:'🔬', color:'#2563eb' },
    { key:'build',       label:'Build with Recourse', icon:'⚙',  color:'#7c3aed' },
    { key:'deploy',      label:'Deploy',             icon:'🏢', color:'#059669' },
  ];
  return (
    <div style={{ display:'flex', gap:8, justifyContent:'center', padding:'1rem 1rem', background:'#f8fafc', borderBottom:'1px solid #e2e8f0', position:'sticky', top:64, zIndex:100 }}>
      {tabs.map(t=>(
        <button key={t.key} onClick={()=>setActive(t.key)}
          className={`tab-btn ${active===t.key?'tab-btn-active':''}`}
          style={{
            padding:'10px 20px', borderRadius:10, border:'1.5px solid', fontWeight:700, fontSize:'.82rem', cursor:'pointer', fontFamily:'inherit',
            borderColor: active===t.key ? '#0f172a' : '#e2e8f0',
            background: active===t.key ? '#0f172a' : '#fff',
            color: active===t.key ? '#fff' : '#475569',
          }}>
          <span style={{ marginRight:6 }}>{t.icon}</span>{t.label}
        </button>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════
   TRACK 1: RESEARCH
═══════════════════════════════════════ */
function ResearchTrack() {
  const [search, setSearch]     = useState('');
  const [approach, setApproach] = useState('All');
  const [focus, setFocus]       = useState('All');
  const [votes, setVotes]       = useState({});

  const filtered = useMemo(() => {
    return PAPERS.filter(p => {
      const matchSearch = search === '' || p.title.toLowerCase().includes(search.toLowerCase()) || p.authors.toLowerCase().includes(search.toLowerCase());
      const matchApproach = approach === 'All' || p.approach === approach;
      const matchFocus = focus === 'All' || p.tags.includes(focus);
      return matchSearch && matchApproach && matchFocus;
    });
  }, [search, approach, focus]);

  const toggleVote = (id) => setVotes(prev => ({ ...prev, [id]: !prev[id] }));

  return (
    <div style={{ padding:'2rem 1.5rem' }}>
      {/* Header */}
      <div style={{ marginBottom:'2rem' }}>
        <span className="track-badge" style={{ background:'#dbeafe', color:'#1d4ed8', marginBottom:12, display:'inline-block' }}>Track 1 · Researchers</span>
        <h2 style={{ fontSize:'1.6rem', fontWeight:800, letterSpacing:'-.03em', marginBottom:'.5rem' }}>Explore Research</h2>
        <p style={{ fontSize:'.88rem', color:'#64748b', lineHeight:1.65 }}>Map the field. Search 150+ papers. Propose new directions.</p>
      </div>

      {/* Search */}
      <div style={{ marginBottom:'1.25rem' }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search papers, authors..."
          style={{ width:'100%', padding:'10px 14px', background:'#f1f5f9', border:'1.5px solid #e2e8f0', borderRadius:9, fontSize:'.88rem', outline:'none', fontFamily:'inherit', transition:'border-color .2s' }}
          onFocus={e=>e.currentTarget.style.borderColor='#2563eb'}
          onBlur={e=>e.currentTarget.style.borderColor='#e2e8f0'}/>
      </div>

      {/* Filters */}
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:'.75rem' }}>
        <span style={{ fontSize:'.72rem', fontWeight:700, color:'#94a3b8', alignSelf:'center', marginRight:4 }}>APPROACH:</span>
        {APPROACHES.map(a=>(
          <button key={a} onClick={()=>setApproach(a)} className="chip" style={{
            background: approach===a ? '#1e3a8a' : '#f1f5f9', color: approach===a ? '#fff' : '#475569',
            cursor:'pointer', border:'none', fontFamily:'inherit',
          }}>{a}</button>
        ))}
      </div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:'1.5rem' }}>
        <span style={{ fontSize:'.72rem', fontWeight:700, color:'#94a3b8', alignSelf:'center', marginRight:4 }}>FOCUS:</span>
        {FOCUS_TAGS.map(t=>(
          <button key={t} onClick={()=>setFocus(t)} className="chip" style={{
            background: focus===t ? '#1e3a8a' : '#f1f5f9', color: focus===t ? '#fff' : '#475569',
            cursor:'pointer', border:'none', fontFamily:'inherit',
          }}>{t}</button>
        ))}
      </div>

      {/* Results count */}
      <div style={{ fontSize:'.78rem', color:'#94a3b8', fontWeight:600, marginBottom:'.75rem' }}>
        {filtered.length} paper{filtered.length!==1?'s':''} found
      </div>

      {/* Paper list */}
      <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:'2.5rem', maxHeight:420, overflowY:'auto', paddingRight:4 }}>
        {filtered.map(p=>(
          <div key={p.id} className="card-lift" style={{ background:'#fff', border:'1px solid #e2e8f0', borderRadius:10, padding:'1rem 1.2rem' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
              <div style={{ flex:1 }}>
                <h4 style={{ fontSize:'.85rem', fontWeight:700, lineHeight:1.4, marginBottom:4, color:'#0f172a' }}>{p.title}</h4>
                <div style={{ fontSize:'.75rem', color:'#64748b', marginBottom:6 }}>{p.authors} · {p.year}</div>
                <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
                  <span className="chip" style={{ background:'#dbeafe', color:'#1d4ed8' }}>{p.approach}</span>
                  {p.tags.map(t=><span key={t} className="chip" style={{ background:'#f1f5f9', color:'#475569' }}>{t}</span>)}
                </div>
              </div>
              <div style={{ textAlign:'center', flexShrink:0 }}>
                <div style={{ fontSize:'.95rem', fontWeight:800, color:'#0f172a' }}>{p.citations}</div>
                <div style={{ fontSize:'.6rem', color:'#94a3b8', fontWeight:600 }}>CITES</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* ── Idea Board ── */}
      <div style={{ borderTop:'1px solid #e2e8f0', paddingTop:'2rem' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem' }}>
          <div>
            <h3 style={{ fontSize:'1.1rem', fontWeight:800, letterSpacing:'-.02em' }}>Idea Board</h3>
            <p style={{ fontSize:'.78rem', color:'#64748b' }}>Propose metrics, datasets, or open problems.</p>
          </div>
          <button style={{ padding:'7px 14px', background:'#dbeafe', color:'#1d4ed8', borderRadius:8, fontWeight:700, fontSize:'.78rem', border:'none', cursor:'pointer', fontFamily:'inherit' }}>+ New Idea</button>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {IDEAS.map(idea=>(
            <div key={idea.id} className="idea-card" style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', background:'#fff', border:'1px solid #e2e8f0', borderRadius:9 }}>
              <button onClick={()=>toggleVote(idea.id)} className={`upvote-btn ${votes[idea.id]?'voted':''}`}
                style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:1, padding:'6px 8px', background: votes[idea.id] ? '#dbeafe' : '#f8fafc', border:'1px solid #e2e8f0', borderRadius:7, cursor:'pointer', minWidth:44 }}>
                <span style={{ fontSize:'.7rem', fontWeight:800 }}>▲</span>
                <span style={{ fontSize:'.78rem', fontWeight:800, color: votes[idea.id] ? '#2563eb' : '#0f172a' }}>{idea.votes + (votes[idea.id]?1:0)}</span>
              </button>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:'.82rem', fontWeight:600, color:'#0f172a', lineHeight:1.4, marginBottom:3 }}>{idea.title}</div>
                <div style={{ display:'flex', gap:5 }}>
                  <span className="chip" style={{ background:'#f1f5f9', color:'#475569' }}>{idea.category}</span>
                  <span className="chip" style={{
                    background: idea.status==='open' ? '#dcfce7' : idea.status==='in-progress' ? '#fef3c7' : '#e0e7ff',
                    color: idea.status==='open' ? '#166534' : idea.status==='in-progress' ? '#92400e' : '#3730a3',
                  }}>{idea.status}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* CTA */}
      <div style={{ marginTop:'2rem', display:'flex', gap:10 }}>
        <a href="https://github.com/charmlab" target="_blank" rel="noopener" style={{
          flex:1, padding:'12px', background:'#0f172a', color:'#fff', borderRadius:9, fontWeight:700, fontSize:'.88rem', textDecoration:'none', textAlign:'center',
          transition:'background .2s',
        }} onMouseEnter={e=>e.currentTarget.style.background='#1e3a8a'} onMouseLeave={e=>e.currentTarget.style.background='#0f172a'}>
          Submit a Paper
        </a>
        <a href="https://github.com/charmlab" target="_blank" rel="noopener" style={{
          flex:1, padding:'12px', background:'#fff', color:'#0f172a', borderRadius:9, fontWeight:700, fontSize:'.88rem', textDecoration:'none', textAlign:'center',
          border:'1.5px solid #e2e8f0', transition:'all .2s',
        }}>
          Join the Discussion
        </a>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   TRACK 2: BUILD
═══════════════════════════════════════ */
function BuildTrack() {
  const [modelFilter, setModelFilter] = useState('All');
  const [dataFilter, setDataFilter]   = useState('All');
  const [selModel, setSelModel]       = useState('Tree-Based');
  const [selDataset, setSelDataset]   = useState('german-credit');

  const filteredMethods = useMemo(() => {
    return METHODS_DATA.filter(m => {
      const matchModel = modelFilter==='All' || m.model===modelFilter || m.model==='Any';
      const matchData  = dataFilter==='All'  || m.data===dataFilter;
      return matchModel && matchData;
    });
  }, [modelFilter, dataFilter]);

  const codeSnippet = useMemo(() => {
    const methods = filteredMethods.slice(0,3);
    const pkgs = [...new Set(methods.map(m=>m.pkg))];
    const methodNames = methods.map(m=>`'${m.name}'`).join(', ');
    return {
      install: pkgs.map(p=>`pip install ${p}`).join('\n'),
      code: `from carla import Benchmark, MLModel
from carla.evaluation import auto_evaluate

# Load model & data
model = MLModel.load("${selModel.toLowerCase().replace(/[^a-z]/g,'_')}")
data  = Benchmark("${selDataset}")

# Evaluate top methods
results = auto_evaluate(
    model, data,
    methods=[${methodNames}]
)
print(results.summary())`,
    };
  }, [filteredMethods, selModel, selDataset]);

  const chartData = filteredMethods.map(m=>({
    ...m, z: m.sparsity * 80,
  }));

  return (
    <div style={{ padding:'2rem 1.5rem' }}>
      <div style={{ marginBottom:'2rem' }}>
        <span className="track-badge" style={{ background:'#ede9fe', color:'#6d28d9', marginBottom:12, display:'inline-block' }}>Track 2 · Practitioners</span>
        <h2 style={{ fontSize:'1.6rem', fontWeight:800, letterSpacing:'-.03em', marginBottom:'.5rem' }}>Build with Recourse</h2>
        <p style={{ fontSize:'.88rem', color:'#64748b', lineHeight:1.65 }}>Interactive benchmarks, code, and evaluation tools.</p>
      </div>

      {/* ── Applicability Matrix ── */}
      <div style={{ background:'#fff', border:'1px solid #e2e8f0', borderRadius:12, padding:'1.25rem', marginBottom:'1.5rem' }}>
        <h3 style={{ fontSize:'.95rem', fontWeight:800, marginBottom:'.75rem', letterSpacing:'-.02em' }}>Applicability Matrix</h3>
        <div style={{ display:'flex', gap:8, marginBottom:'1rem', flexWrap:'wrap' }}>
          <div>
            <div style={{ fontSize:'.65rem', fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.08em', marginBottom:4 }}>Model</div>
            <select value={modelFilter} onChange={e=>setModelFilter(e.target.value)}
              style={{ padding:'6px 10px', background:'#f1f5f9', border:'1.5px solid #e2e8f0', borderRadius:7, fontSize:'.8rem', fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>
              {MODEL_TYPES.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:'.65rem', fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.08em', marginBottom:4 }}>Data</div>
            <select value={dataFilter} onChange={e=>setDataFilter(e.target.value)}
              style={{ padding:'6px 10px', background:'#f1f5f9', border:'1.5px solid #e2e8f0', borderRadius:7, fontSize:'.8rem', fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>
              {DATA_TYPES.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
        </div>
        <div style={{ fontSize:'.68rem', color:'#94a3b8', marginBottom:8 }}>
          Runtime (s) vs Validity (%) · Bubble size = Sparsity · {filteredMethods.length} methods shown
        </div>
        <div style={{ height:240 }}>
          <ResponsiveContainer width="100%" height="100%">
            <ScatterChart margin={{ top:10, right:10, bottom:20, left:20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <XAxis type="number" dataKey="runtime" name="Runtime" unit="s" tick={{ fontSize:11, fill:'#64748b' }} label={{ value:'Runtime (s)', position:'insideBottom', offset:-10, fontSize:11, fill:'#94a3b8' }}/>
              <YAxis type="number" dataKey="validity" name="Validity" unit="%" domain={[70,100]} tick={{ fontSize:11, fill:'#64748b' }} label={{ value:'Validity %', angle:-90, position:'insideLeft', fontSize:11, fill:'#94a3b8' }}/>
              <ZAxis type="number" dataKey="z" range={[60,300]}/>
              <RTooltip cursor={{ strokeDasharray:'3 3' }}
                content={({active,payload})=>{
                  if(!active||!payload?.length) return null;
                  const d=payload[0].payload;
                  return (
                    <div style={{ background:'#0f172a', color:'#fff', padding:'10px 14px', borderRadius:9, fontSize:'.78rem', lineHeight:1.6, boxShadow:'0 8px 24px rgba(0,0,0,.2)' }}>
                      <div style={{ fontWeight:800, marginBottom:4 }}>{d.name}</div>
                      <div>Validity: {d.validity}%</div>
                      <div>Runtime: {d.runtime}s</div>
                      <div>Sparsity: {d.sparsity}</div>
                      <div style={{ color:'#94a3b8', marginTop:3 }}>pkg: {d.pkg}</div>
                    </div>
                  );
                }}/>
              <Scatter data={chartData}>
                {chartData.map((entry,i)=><Cell key={i} fill={entry.color}/>)}
              </Scatter>
            </ScatterChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* ── Pip Install Wizard ── */}
      <div style={{ background:'#0f172a', borderRadius:12, padding:'1.25rem', marginBottom:'1.5rem', overflow:'hidden' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem' }}>
          <h3 style={{ fontSize:'.95rem', fontWeight:800, color:'#fff', letterSpacing:'-.02em' }}>Quick Start</h3>
          <div style={{ display:'flex', gap:6 }}>
            {['#ef4444','#f59e0b','#22c55e'].map(c=><div key={c} style={{ width:10, height:10, borderRadius:'50%', background:c }}/>)}
          </div>
        </div>
        <div style={{ display:'flex', gap:8, marginBottom:'1rem' }}>
          <select value={selModel} onChange={e=>setSelModel(e.target.value)}
            style={{ padding:'6px 10px', background:'#1e293b', color:'#e2e8f0', border:'1px solid #334155', borderRadius:6, fontSize:'.78rem', fontWeight:600, fontFamily:'inherit' }}>
            {['Tree-Based','Neural Net','Linear','SVM'].map(m=><option key={m}>{m}</option>)}
          </select>
          <select value={selDataset} onChange={e=>setSelDataset(e.target.value)}
            style={{ padding:'6px 10px', background:'#1e293b', color:'#e2e8f0', border:'1px solid #334155', borderRadius:6, fontSize:'.78rem', fontWeight:600, fontFamily:'inherit' }}>
            {['german-credit','adult-income','compas','give-me-credit'].map(d=><option key={d}>{d}</option>)}
          </select>
        </div>
        <pre style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:'.78rem', lineHeight:1.8, color:'#e2e8f0', overflowX:'auto', whiteSpace:'pre-wrap' }}>
          <span style={{ color:'#6b7280' }}># Install packages</span>{'\n'}
          <span style={{ color:'#4ade80' }}>$</span> {codeSnippet.install}{'\n\n'}
          <span style={{ color:'#6b7280' }}># Evaluate recourse methods</span>{'\n'}
          <span style={{ color:'#93c5fd' }}>{codeSnippet.code}</span>
        </pre>
      </div>

      {/* ── Metrics Glossary ── */}
      <div style={{ borderTop:'1px solid #e2e8f0', paddingTop:'1.5rem' }}>
        <h3 style={{ fontSize:'1rem', fontWeight:800, letterSpacing:'-.02em', marginBottom:'1rem' }}>Metrics Glossary</h3>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {METRICS_GLOSSARY.map(m=>(
            <div key={m.term} style={{ display:'flex', gap:12, padding:'10px 12px', background:'#f8fafc', borderRadius:9, border:'1px solid #f1f5f9' }}>
              <div style={{ minWidth:90 }}>
                <div style={{ fontSize:'.85rem', fontWeight:800, color:'#0f172a' }}>{m.term}</div>
                <div style={{ fontSize:'.65rem', color:'#94a3b8', fontWeight:600 }}>aka: {m.aka}</div>
              </div>
              <div style={{ fontSize:'.8rem', color:'#475569', lineHeight:1.55, flex:1 }}>{m.def}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

          {loading ? (
            <span style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
              <span style={{ width:16, height:16, border:'2px solid rgba(255,255,255,.3)', borderTopColor:'#fff', borderRadius:'50%', display:'inline-block', animation:'spin 1s linear infinite' }}/>
              Generating Recourse Plans...
            </span>
          ) : recourseGenerated ? 'Regenerate Recourse' : 'Generate Recourse'}
        </button>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

        {/* Recourse plans */}
        {recourseGenerated && (
          <div style={{ display:'flex', flexDirection:'column', gap:8 }} className="fade-in">
            {RECOURSE_PLANS.map((plan,i) => (
              <div key={plan.method} className="slide-left" style={{
                background:'#1e293b', borderRadius:10, padding:'1rem', border:`1.5px solid ${plan.color}44`,
                animationDelay:`${i*.15}s`,
              }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:8, height:8, borderRadius:'50%', background:plan.color }}/>
                    <span style={{ fontWeight:800, fontSize:'.82rem', color:'#e2e8f0' }}>{plan.method}</span>
                  </div>
                  <div style={{ display:'flex', gap:8 }}>
                    <span className="chip" style={{ background:`${plan.color}22`, color:plan.color }}>Validity: {plan.validity}</span>
                    <span className="chip" style={{ background:'#0f172a', color:'#94a3b8' }}>Cost: {plan.cost}</span>
                  </div>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                  {plan.actions.map((a,j)=>(
                    <div key={j} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', background:'#0f172a', borderRadius:7 }}>
                      <span style={{ fontSize:'1rem', color: a.direction==='↑' ? '#4ade80' : '#f87171', fontWeight:700 }}>{a.direction}</span>
                      <span style={{ fontSize:'.8rem', color:'#e2e8f0', fontWeight:600, flex:1 }}>{a.feature}</span>
                      <span style={{ fontSize:'.8rem', color:plan.color, fontWeight:800 }}>{a.change}</span>
                      <span className="chip" style={{
                        background: a.effort==='Low' ? '#dcfce7' : a.effort==='Medium' ? '#fef3c7' : '#fee2e2',
                        color: a.effort==='Low' ? '#166534' : a.effort==='Medium' ? '#92400e' : '#991b1b',
                      }}>{a.effort}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* CTA */}
      <div style={{ display:'flex', gap:10 }}>
        <a href="mailto:charm-lab@uwaterloo.ca" style={{
          flex:1, padding:'14px', background:'linear-gradient(90deg,#059669,#10b981)', color:'#fff', borderRadius:10,
          fontWeight:800, fontSize:'.9rem', textDecoration:'none', textAlign:'center', transition:'opacity .2s',
          boxShadow:'0 4px 16px rgba(5,150,105,.3)',
        }}>Partner with Us</a>
        <a href="mailto:charm-lab@uwaterloo.ca" style={{
          flex:1, padding:'14px', background:'#fff', color:'#0f172a', borderRadius:10, fontWeight:700, fontSize:'.9rem',
          textDecoration:'none', textAlign:'center', border:'1.5px solid #e2e8f0',
        }}>Schedule an Audit</a>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
function App() {
  const [activeTab, setActiveTab] = useState('research');
  const [isMobile, setIsMobile]   = useState(false);

  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 1024);
    check();
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);

  return (
    <>
      <Nav />
      <Hero />

      {/* ── TRACK SECTION ── */}
      <section id="tracks" style={{ borderTop:'1px solid #e2e8f0' }}>
        {/* Section header */}
        <div style={{ textAlign:'center', padding:'3rem 2rem 0' }}>
          <div style={{ fontSize:'.72rem', fontWeight:700, color:'#2563eb', textTransform:'uppercase', letterSpacing:'.12em', marginBottom:'.6rem' }}>Choose Your Path</div>
          <h2 style={{ fontSize:'clamp(1.6rem,3vw,2.2rem)', fontWeight:900, letterSpacing:'-.03em', marginBottom:'.6rem' }}>Three Tracks, One Mission</h2>
          <p style={{ fontSize:'1rem', color:'#64748b', maxWidth:580, margin:'0 auto', lineHeight:1.7 }}>
            Whether you study recourse, build it, or deploy it—find exactly what you need.
          </p>
        </div>

        {isMobile && <TrackTabs active={activeTab} setActive={setActiveTab} />}

        {isMobile ? (
          /* Mobile: show one track at a time */
          <div style={{ maxWidth:640, margin:'0 auto' }}>
            {activeTab === 'research' && <ResearchTrack />}
            {activeTab === 'build'    && <BuildTrack />}
            {activeTab === 'deploy'   && <DeployTrack />}
          </div>
        ) : (
          /* Desktop: 3 independent scroll columns */
          <div style={{ maxWidth:1440, margin:'0 auto', display:'grid', gridTemplateColumns:'1fr 1fr 1fr' }}>
            {/* Column headers */}
            <div style={{ gridColumn:'1/-1', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', borderBottom:'1px solid #e2e8f0' }}>
              {[
                { label:'Explore Research', color:'#2563eb', bg:'#dbeafe', icon:'🔬', id:'research' },
                { label:'Build with Recourse', color:'#7c3aed', bg:'#ede9fe', icon:'⚙', id:'build' },
                { label:'Deploy', color:'#059669', bg:'#dcfce7', icon:'🏢', id:'deploy' },
              ].map((col,i)=>(
                <a key={col.id} href={`#${col.id}`} style={{
                  display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:'1rem',
                  borderRight: i<2 ? '1px solid #e2e8f0' : 'none', background:'#f8fafc', textDecoration:'none',
                  transition:'background .2s',
                }} onMouseEnter={e=>e.currentTarget.style.background='#fff'} onMouseLeave={e=>e.currentTarget.style.background='#f8fafc'}>
                  <span style={{ fontSize:'1.1rem' }}>{col.icon}</span>
                  <span style={{ fontWeight:800, fontSize:'.88rem', color:col.color }}>{col.label}</span>
                </a>
              ))}
            </div>

            {/* Scrollable columns */}
            <div id="research" style={{ height:'calc(100vh - 64px)', overflowY:'auto', borderRight:'1px solid #e2e8f0' }}>
              <ResearchTrack />
            </div>
            <div id="build" style={{ height:'calc(100vh - 64px)', overflowY:'auto', borderRight:'1px solid #e2e8f0' }}>
              <BuildTrack />
            </div>
            <div id="deploy" style={{ height:'calc(100vh - 64px)', overflowY:'auto' }}>
              <DeployTrack />
            </div>
          </div>
        )}
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
